# Сборка: python build.py → каталог site/
# Публикация: push содержимого site/ в ветку gh-pages (без API deploy-pages).
#
# Настройка один раз в репозитории:
#   Settings → Pages → Build and deployment → Source: Deploy from a branch
#   Branch: gh-pages, folder: / (root)
#
# Если у репозитория по умолчанию «Read» для GITHUB_TOKEN:
#   Settings → Actions → General → Workflow permissions → Read and write permissions
#
# (Ошибка 404 у actions/deploy-pages бывает, когда в Pages не выбран источник
# «GitHub Actions» — тогда официальный deploy не создаёт deployment.)

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: python build.py

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
